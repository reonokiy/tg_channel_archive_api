services:
  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tgarchive:tgarchive@postgres:5432/tgarchive?sslmode=disable
      HTTP_ADDR: :8080
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_SOURCE: ${TELEGRAM_SOURCE:-bot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_RECEIVE_MODE: ${TELEGRAM_BOT_RECEIVE_MODE:-longpoll}
      TELEGRAM_BOT_POLL_TIMEOUT: ${TELEGRAM_BOT_POLL_TIMEOUT:-50s}
      TELEGRAM_BOT_SECRET_TOKEN: ${TELEGRAM_BOT_SECRET_TOKEN:-}
      TELEGRAM_BOT_WEBHOOK_PATH: ${TELEGRAM_BOT_WEBHOOK_PATH:-/telegram/webhook}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE:-}
      TELEGRAM_PASSWORD: ${TELEGRAM_PASSWORD:-}
      TELEGRAM_SESSION_FILE: /data/telegram.session.json
      TELEGRAM_CHANNELS: ${TELEGRAM_CHANNELS:-}
      TELEGRAM_POLL_INTERVAL: ${TELEGRAM_POLL_INTERVAL:-5m}
      TELEGRAM_BATCH_LIMIT: ${TELEGRAM_BATCH_LIMIT:-100}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-2}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DEFAULT_PAGE_LIMIT: ${DEFAULT_PAGE_LIMIT:-50}
      MAX_PAGE_LIMIT: ${MAX_PAGE_LIMIT:-100}
      MEDIA_CACHE_ENABLED: ${MEDIA_CACHE_ENABLED:-true}
      MEDIA_CACHE_CONTROL: ${MEDIA_CACHE_CONTROL:-public, max-age=3600}
    ports:
      - "8080:8080"
    volumes:
      - telegram-session:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tgarchive
      POSTGRES_USER: tgarchive
      POSTGRES_PASSWORD: tgarchive
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgarchive -d tgarchive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  telegram-session:
